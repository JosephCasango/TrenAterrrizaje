<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANGLARE - Próximamente</title>
    <style>
        /* Estilos Generales */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000000; /* Fondo negro absoluto */
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            color: white;
        }

        .logo-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 90%;
        }

        .logo-container img {
            max-width: 100%;
            height: auto;
            /* ESTO HACE QUE EL FONDO DE LA IMAGEN SEA INVISIBLE */
            mix-blend-mode: screen; 
            /* Filtro opcional para asegurar que el blanco sea brillante */
            filter: brightness(1.2) contrast(1.1);
        }

        .footer-text {
            padding-bottom: 60px;
            letter-spacing: 12px; /* Más espaciado para un look más premium */
            font-weight: 300;
            font-size: 1rem;
            opacity: 0.6;
            text-transform: uppercase;
        }

        .fade-in {
            animation: fadeIn 3s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="logo-container fade-in">
        <img src="https://i.pinimg.com/736x/c6/09/4c/c6094c07ba70113e1adcc279d1c7cd2a.jpg" alt="VANGLARE">
    </div>

    <div class="footer-text fade-in">
        PROXIMAMENTE
    </div>

</body>
</html>
